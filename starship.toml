format = """
 $all 
"""
right_format = """$time"""# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like ΎΕι  or disable this
# and use the os module below
[username]
show_always = false
# style_user = "bg:#9A348E"
# style_root = "bg:#9A348E"
format = '[$user ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
# [os]
# style = "bg:#9A348E"
# disabled = true # Disabled by default

[directory]
# style= "fg:#6A8AEA"
truncation_length = 4
truncate_to_repo = true
fish_style_pwd_dir_length = 3
# truncation_symbol = "έΑο/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = " ≤░πχ "
"Music" = " ΎΑΒ "
"Movies" = " ≤░┐Π "
"Pictures" =  " ΎΑ╛"
"Sources" = " ΎΕκ "
"Downloads" = " ΎΑβ "
"~" = " ΎΑΧ "
"/" = " ΎΡ▓ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ≤░ΙβΎΕς "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important ≤░Ιβ " = " ≤░ΙβΎΕς "

[line_break]
disabled = true # leave as TRUE  

[character]
success_symbol = " [≤░ΒΦ]() "
# error_symbol =   " [ Όυ╖](fg:#d56767)[ ΌψΜ](fg:#d56767) "
error_symbol =   " [ Όυ╖]()[ ΌψΜ]() "
format = "$symbol"
disabled = false


