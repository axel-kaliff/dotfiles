[mgr]
sort_dir_first = true
show_symlink = true
linemode = "size"
scrolloff = 5

[plugin]
prepend_fetchers = [
  { id = "git", name = "*", run = "git" },
  { id = "git", name = "*/", run = "git" },
]
prepend_previewers = [
  { name = "*", run = "mime-ext", prio = "high" },
]

[preview]
max_width = 600
max_height = 900
image_filter = "lanczos3"

[opener]
edit = [
  { run = 'nvim "$@"', block = true, for = "unix" },
]
reveal = [
  { run = 'xdg-open "$(dirname "$0")"', for = "linux" },
]
play = [
  { run = 'mpv "$@"', orphan = true, for = "unix" },
]

[open]
prepend_rules = [
  { name = "*.md", use = "edit" },
  { name = "*.json", use = "edit" },
  { name = "*.toml", use = "edit" },
  { name = "*.yaml", use = "edit" },
  { name = "*.yml", use = "edit" },
  { name = "*.kdl", use = "edit" },
  { name = "*.lua", use = "edit" },
  { name = "*.fish", use = "edit" },
  { name = "*.sh", use = "edit" },
]
